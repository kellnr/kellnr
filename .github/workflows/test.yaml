name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - v6.0.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  update-npm-hash:
    name: Update NPM dependencies hash
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/npm_and_yarn/')
    outputs:
      sha: ${{ steps.update.outputs.sha }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Update npmDepsHash
        id: update
        run: |
          NEW_HASH=$(nix run nixpkgs#prefetch-npm-deps -- ui/package-lock.json 2>/dev/null)
          echo "New hash: $NEW_HASH"
          sed -i "s|npmDepsHash = \"sha256-[^\"]*\";|npmDepsHash = \"$NEW_HASH\";|" flake.nix

          if ! git diff --quiet flake.nix; then
            git config user.name "${GITHUB_ACTOR}"
            git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
            git add flake.nix
            git commit -m "build(deps): update npmDepsHash in flake.nix [dependabot skip]"
            git push
          fi

          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  lint:
    name: Format & Clippy
    needs: [update-npm-hash]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-npm-hash.outputs.sha || github.sha }}

      - uses: cachix/install-nix-action@v31
        with: { nix_path: "nixpkgs=channel:nixos-unstable" }

      - name: Check formatting
        run: nix develop --command just fmt-check

      - name: Build UI assets
        run: nix develop --command just npm-build

      - name: Clippy
        run: nix develop --command just clippy-deny

  test-kellnr:
    name: Unit Tests
    needs: [update-npm-hash]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-npm-hash.outputs.sha || github.sha }}

      - uses: cachix/install-nix-action@v31
        with: { nix_path: "nixpkgs=channel:nixos-unstable" }

      - name: Tests
        run: nix develop --command just test

  test-kellnr-docker:
    name: Docker Tests (PostgreSQL, S3)
    needs: [update-npm-hash]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-npm-hash.outputs.sha || github.sha }}

      - uses: cachix/install-nix-action@v31
        with: { nix_path: "nixpkgs=channel:nixos-unstable" }

      - name: Tests
        run: nix develop --command just test-docker

  test-kellnr-ui:
    name: UI Tests (Playwright)
    needs: [update-npm-hash]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-npm-hash.outputs.sha || github.sha }}

      - uses: cachix/install-nix-action@v31
        with: { nix_path: "nixpkgs=channel:nixos-unstable" }

      - name: Tests
        run: nix develop --command just test-ui

  nix-build:
    name: Nix Build
    needs: [update-npm-hash]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-npm-hash.outputs.sha || github.sha }}

      - uses: cachix/install-nix-action@v31
        with: { nix_path: "nixpkgs=channel:nixos-unstable" }

      - name: Build with Nix
        run: nix build
